<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Casino Royale</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/estilos/estilosLogin.css}">
</head>
<body>

    <div class="login-container">
        <div class="text-center mb-3">
            <span class="material-icons" style="font-size: 48px; color: var(--casino-red);">person_add</span>
        </div>
        <h4>Registro de Usuario</h4>

        <form th:action="@{/authentication/saveRegister}" method="post">
            
            <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center">
                <span class="material-icons me-2">error</span>
                Hubo un error al registrarse
            </div>

            <div th:if="${msg != null}" class="alert alert-success d-flex align-items-center" th:text="${msg}"></div>

            <div class="input-wrapper">
                <span class="material-icons input-group-text">badge</span>
                <input type="text" name="name" id="name" class="form-control" placeholder="Nombre completo" required autofocus>
            </div>

            <div class="input-wrapper">
                <span class="material-icons input-group-text">person</span>
                <input type="text" name="username" id="username" class="form-control" placeholder="Nombre de usuario" required>
            </div>

            <div class="input-wrapper">
                <span class="material-icons input-group-text">email</span>
                <input type="email" name="userEmail" id="user_email" class="form-control" placeholder="Dirección de Email" required>
            </div>

            <div class="input-wrapper">
                <span class="material-icons input-group-text">lock</span>
                <input type="password" name="userPassword" id="user_password" class="form-control" placeholder="Contraseña" required>
            </div>

            <button type="submit" class="btn btn-casino">
                Crear cuenta
            </button>
            
            <div class="text-center mt-4">
                <p style="color: #888; font-size: 0.9rem;">
                    ¿Ya tienes cuenta? 
                    <a th:href="@{/authentication/loginForm}" style="color: var(--casino-gold); text-decoration: none; font-weight: bold;">Ingresar</a>
                </p>
            </div>

            <a th:href="@{/}" class="back-link d-flex align-items-center justify-content-center">
                <span class="material-icons me-1" style="font-size: 18px;">arrow_back</span>
                Volver al sitio
            </a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
