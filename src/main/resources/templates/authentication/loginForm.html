<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Casino</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/estilos/estilosLogin.css}">

</head>

<body>

    <div class="main-wrapper">

        <div class="logo-header">
            <a th:href="@{/}"><img th:src="@{/img/logo.png}" alt="Logo" class="main-logo"></a>
            <span class="casino-name">WCASINO</span>
        </div>

        <div class="login-container">
            <div class="text-center mb-3">
                <span class="material-icons" style="font-size: 48px; color: var(--casino-red);">casino</span>
            </div>
            <h4>Inicio de Sesión</h4>

            <form th:action="@{/authentication/login}" method="post">

                <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center">
                    <span class="material-icons me-2">error</span>
                    Datos incorrectos
                </div>

                <div th:if="${msg != null}" class="alert alert-success d-flex align-items-center" th:text="${msg}">
                </div>

                <div class="input-wrapper">
                    <span class="material-icons input-group-text">person</span>
                    <input type="text" name="username" class="form-control" placeholder="Usuario" required autofocus>
                </div>

                <div class="input-wrapper">
                    <span class="material-icons input-group-text">lock</span>
                    <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
                </div>

                <button type="submit" class="btn btn-casino mb-3">
                    Entrar ahora
                </button>

                <div class="text-center mt-4">
                    <p style="color: #888; font-size: 0.9rem;">
                        ¿No tienes cuenta?
                        <a th:href="@{/authentication/register}"
                            style="color: var(--casino-gold); text-decoration: none; font-weight: bold;">Regístrate</a>
                    </p>
                </div>           
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
