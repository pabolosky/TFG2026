<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/estilos/estilosUserList.css}">
</head>
<body>
        <div th:replace="~{fragments/header :: topbar}"></div>
        <table>
            <thead>
                <tr>
                <th>Nº Departamento</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Username</th>
                <th>Estatus</th>
                <th>Fecha de registro</th>
                <th>Dinero</th>
                <th>Usuario activo</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.userId}"></td>
                <td th:text="${user.name}"></td>
                <td th:text="${user.userEmail}"></td>
                <td th:text="${user.username}"></td>
                <td th:text="${user.userStatus}"></td>
                <td th:text="${user.registerDate}"></td>
                <td th:text="${user.userMoney}"></td>
                <td th:text="${user.active}"></td>
                <td> 
    <a th:if="${user.active == false}" 
       th:href="@{/authentication/usersList/activar/{id}(id=${user.userId})}" 
       class="btn-activar">Activar</a>

    <a th:if="${user.active == true}" 
       th:href="@{/authentication/usersList/desactivar/{id}(id=${user.userId})}" 
       class="btn-desactivar">Desactivar</a>
</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
