<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino - Slots</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/estilos/estilosSlots.css}">
</head>

<body th:style="'background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url(' + @{/img/bg.jpg} + ') no-repeat center center fixed; background-size: cover;'">

    <div th:replace="~{fragments/header :: topbar}"></div>

    <div class="container d-flex flex-column align-items-center justify-content-start pt-4">

        <div class="game-card position-relative overflow-hidden">
            <span class="material-symbols-outlined bg-icon">casino</span>

            <div class="text-center mb-4">
                <span class="material-symbols-outlined" style="color: var(--casino-gold); font-size: 48px;">rotate_right</span>
                <h4 class="mt-2 fw-bold">LUCKY SLOTS</h4>
            </div>

            <div class="balance-box text-center" id="balance-box">
                <small class="text-uppercase text-secondary d-block mb-1">Tu Crédito Disponible</small>
                <h3 class="gold-text mb-0"><span id="saldo-val">0</span> €</h3>
            </div>

            <div class="reels-wrapper">
                <div class="reels">
                    <div class="reel" id="reel0"><span id="r0">🎰</span></div>
                    <div class="reel" id="reel1"><span id="r1">🎰</span></div>
                    <div class="reel" id="reel2"><span id="r2">🎰</span></div>
                </div>
            </div>

            <div id="result-msg" class="result-msg"></div>

            <div class="bet-section mt-3">
                <label>Cantidad a Apostar</label>
                <div class="bet-row">
                    <input type="range" id="slider-apuesta" min="10" max="1000" step="10" value="50"
                           oninput="setApuesta(this.value)">
                    <div class="bet-display" id="display-apuesta">50 €</div>
                </div>
                <div class="bet-buttons">
                    <button type="button" class="bet-btn" data-value="10">10</button>
                    <button type="button" class="bet-btn" data-value="25">25</button>
                    <button type="button" class="bet-btn" data-value="50">50</button>
                    <button type="button" class="bet-btn" data-value="100">100</button>
                    <button type="button" class="bet-btn" data-value="250">250</button>
                    <button type="button" class="bet-btn" data-value="500">500</button>
                </div>
            </div>

            <button class="btn-spin d-flex align-items-center justify-content-center gap-2"
                    id="spin-btn" onclick="girar()">
                <span class="material-symbols-outlined">rotate_right</span>
                Girar Ahora
            </button>

            <div class="paytable">
                <div class="pay-row"><span>3 iguales 💎</span><span>×10</span></div>
                <div class="pay-row"><span>3 iguales ⭐🔔🍒🍋</span><span>×10</span></div>
                <div class="pay-row"><span>2 iguales (cualquier par)</span><span>×2</span></div>
                <div class="pay-row"><span>Sin combinación</span><span>—</span></div>
            </div>

            <div class="text-center mt-4">
                <a th:href="@{/}" class="text-secondary text-decoration-none small">
                    <span class="material-symbols-outlined align-middle fs-6">arrow_back</span>
                    Volver al Lobby
                </a>
            </div>
        </div>
    </div>

    <meta th:if="${_csrf}" name="_csrf" th:content="${_csrf.token}"/>

    <script th:inline="javascript">
        let saldo = [[${saldo}]];
        let apuesta = 50;
        let girando = false;
        const simbolos = ['🍒', '🍋', '🔔', '⭐', '💎'];

        document.addEventListener('DOMContentLoaded', () => {
            setSaldo(saldo);
            setApuesta(50);

            document.querySelectorAll('.bet-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    const val = parseInt(this.dataset.value);
                    setApuesta(val);
                    document.getElementById('slider-apuesta').value = val;
                    document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        });

        function setSaldo(val) {
            saldo = parseInt(val);
            document.getElementById('saldo-val').textContent = saldo;
            const box = document.getElementById('balance-box');
            box.classList.remove('bump');
            void box.offsetWidth;
            box.classList.add('bump');
            actualizarBoton();
        }

        function setApuesta(val) {
            apuesta = parseInt(val);
            document.getElementById('display-apuesta').textContent = apuesta + ' €';
            document.getElementById('slider-apuesta').value = apuesta;
            actualizarBoton();
        }

        function actualizarBoton() {
            document.getElementById('spin-btn').disabled = girando || saldo < apuesta;
        }

        function girar() {
            if (girando || saldo < apuesta) return;
            girando = true;
            actualizarBoton();

            const msg = document.getElementById('result-msg');
            msg.className = 'result-msg';
            msg.textContent = '';

            [0, 1, 2].forEach(i => {
                document.getElementById('reel' + i).classList.add('spinning');
                document.getElementById('reel' + i).classList.remove('win');
            });

            const interval = setInterval(() => {
                document.getElementById('r0').textContent = simbolos[Math.floor(Math.random() * simbolos.length)];
                document.getElementById('r1').textContent = simbolos[Math.floor(Math.random() * simbolos.length)];
                document.getElementById('r2').textContent = simbolos[Math.floor(Math.random() * simbolos.length)];
            }, 100);

            fetch('/games/slots/spin', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]')?.content || ''
                },
                body: 'apuesta=' + apuesta
            })
            .then(res => res.json())
            .then(data => {
                clearInterval(interval);
                [0, 1, 2].forEach(i => document.getElementById('reel' + i).classList.remove('spinning'));

                if (data.ok) {
                    document.getElementById('r0').textContent = data.resultado[0];
                    document.getElementById('r1').textContent = data.resultado[1];
                    document.getElementById('r2').textContent = data.resultado[2];

                    setSaldo(data.saldo);
                    msg.classList.add('show');

                    if (data.premio > 0) {
                        msg.textContent = '¡GANASTE! +' + data.premio + ' €';
                        msg.classList.add('ganaste');
                        [0, 1, 2].forEach(i => document.getElementById('reel' + i).classList.add('win'));
                    } else {
                        msg.textContent = 'PERDISTE. -' + apuesta + ' €';
                        msg.classList.add('perdiste');
                    }
                } else {
                    alert('Error: ' + data.error);
                }
            })
            .catch(() => alert('Error de conexión con el casino.'))
            .finally(() => {
                girando = false;
                actualizarBoton();
            });
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
