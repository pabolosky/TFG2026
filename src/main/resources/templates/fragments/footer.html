<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>
    <div th:fragment="bottombar">
        <style>
            .footer-bottom {
                text-align: center;
                padding: 30px 0;
                /* Línea superior sutil para separar del contenido */
                border-top: 1px solid #222; 
                background-color: #0a0a0a; /* Un tono un poco más oscuro que el fondo */
                font-size: 0.85rem;
                color: #555;               
                width: 100%;
                
                /* LA CLAVE: Empuja el footer hacia abajo si el contenido es corto */
                margin-top: auto; 
            }
            
            .footer-bottom span {
                color: var(--casino-red, #e6192e);
                font-weight: bold;
            }
        </style>

        <footer class="footer-bottom">
            &copy; 2026 <span>WCasino</span> · Todos los derechos reservados · Juego Responsable (+18)
        </footer>
    </div>
</body>
</html>
