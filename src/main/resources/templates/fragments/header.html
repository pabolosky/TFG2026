<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
</head>
<body>

<div th:fragment="topbar">
    <style>
        :root {
            --casino-red: #e6192e;
            --casino-black: #000000;
            --casino-dark-grey: #1a1a1a;
        }

        .top-bar {
            width: 100%;
            height: 100px;
            background-color: var(--casino-black);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            position: relative;
            /* CAMBIO 1: Línea roja abajo */
            border-bottom: 3px solid var(--casino-red);
        }

        .logo img {
            height: 70px;
            display: block;
        }

        .menu-center, .menu-right {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .menu-center {
            flex-direction: column;
        }

        .menu-title {
            color: white;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .menu-center .dropdown, .menu-right .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            background-color: #222;
            border-radius: 5px;
            list-style: none;
            padding: 5px 0;
            margin: 0;
            min-width: 180px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            z-index: 1000;
            font-size: 0.9rem;
            border: 1px solid #333;
        }

        .menu-center .dropdown {
            left: 50%;
            transform: translateX(-50%);
            top: 120%;
        }

        .menu-right .dropdown {
            right: 0;
            top: 80%;
        }

        .menu-center.show-dropdown .dropdown, 
        .menu-right.show-dropdown .dropdown {
            display: block;
        }

        .dropdown li a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-weight: bold;
        }

        /* CAMBIO 2: Hover en color rojo */
        .dropdown li a:hover {
            background-color: var(--casino-red);
            color: white;
        }

        .menu-right {
            color: var(--casino-red);
        }

        .menu-right .material-symbols-outlined {
            font-size: 48px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .menu-right .material-symbols-outlined:hover {
            transform: scale(1.1);
            color: #ff4d4d;
        }
    </style>

    <div class="top-bar">
        <div class="logo">
            <a th:href="@{/}"><img th:src="@{/img/logo.png}" alt="Logo"></a>
        </div>
        
        <div class="menu-center" id="menu-juegos">
            <span class="menu-title">
                {NOMBRE CASINO}
            </span>
        </div>
        
        <div class="menu-right" id="menu-login">
            <span class="material-symbols-outlined">person</span>
            <ul class="dropdown">
                <li sec:authorize="isAnonymous()">
                    <a th:href="@{/authentication/register}">Registrarse</a>
                </li>
                <li sec:authorize="isAnonymous()">
                    <a th:href="@{/authentication/loginForm}">Iniciar sesión</a>
                </li>
                <li sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" id="logoutForm" style="display:none;"></form>
                    <a href="javascript:void(0)" onclick="document.getElementById('logoutForm').submit();">
                        Cerrar sesión
                    </a>
                </li>
            </ul>
        </div>
    </div>
    <script th:src="@{/scripts/dropdownMenus.js}"></script>
</div>

</body>
</html>
